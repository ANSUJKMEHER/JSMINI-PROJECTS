<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Todo List</title>
  <style>
    /* Basic, minimal CSS */
    :root{--accent:#2b7cff}
    body{font-family:Arial,Helvetica,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#f4f6fb}
    .card{background:#fff;padding:20px;border-radius:8px;box-shadow:0 6px 18px rgba(16,24,40,0.08);width:320px}
    h1{font-size:20px;margin:0 0 12px;color:#0f172a}
    .input-row{display:flex;gap:8px;margin-bottom:12px}
    input[type=text]{flex:1;padding:8px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:14px}
    button{background:var(--accent);color:#fff;border:0;padding:8px 12px;border-radius:6px;cursor:pointer}
    ul{list-style:none;padding:0;margin:0;max-height:300px;overflow:auto}
    li{display:flex;align-items:center;justify-content:space-between;padding:8px 6px;border-bottom:1px solid #eef2ff}
    .text{flex:1;margin:0 8px;color:#0f172a}
    .text.completed{opacity:0.6;text-decoration:line-through}
    .actions{display:flex;gap:6px}
    .btn-icon{background:transparent;border:0;cursor:pointer;padding:6px;border-radius:6px}
    .btn-icon.delete{color:#ef4444}
    .small{font-size:13px;color:#6b7280;margin-top:8px}
  </style>
</head>
<body>
  <div class="card">
    <h1>Todo List</h1>
    <div class="input-row">
      <input id="taskInput" type="text" placeholder="Add a new task" />
      <button id="addBtn">Add</button>
    </div>
    <ul id="list"></ul>
    <div class="small">Tip: click a task to toggle completed. Items are saved in your browser.</div>
  </div>

  <script>
    const input = document.getElementById('taskInput');
    const addBtn = document.getElementById('addBtn');
    const list = document.getElementById('list');

    function readTodos(){
      try{ return JSON.parse(localStorage.getItem('todos')||'[]') }catch(e){ return [] }
    }

    function saveTodos(todos){ localStorage.setItem('todos', JSON.stringify(todos)) }

    function render(){
      const todos = readTodos();
      list.innerHTML = '';
      todos.forEach((t, i)=>{
        const li = document.createElement('li');
        const span = document.createElement('span');
        span.textContent = t.text;
        span.className = 'text' + (t.done ? ' completed' : '');
        span.addEventListener('click', ()=>{ toggleDone(i) });

        const actions = document.createElement('div'); actions.className='actions';
        const del = document.createElement('button'); del.className='btn-icon delete'; del.textContent='Delete';
        del.addEventListener('click', ()=>{ remove(i) });

        actions.appendChild(del);
        li.appendChild(span);
        li.appendChild(actions);
        list.appendChild(li);
      })
    }

    function add(){
      const v = input.value.trim();
      if(!v) return;
      const todos = readTodos();
      todos.push({text:v,done:false});
      saveTodos(todos);
      input.value='';
      render();
    }

    function remove(i){
      const todos = readTodos();
      todos.splice(i,1);
      saveTodos(todos);
      render();
    }

    function toggleDone(i){
      const todos = readTodos();
      todos[i].done = !todos[i].done;
      saveTodos(todos);
      render();
    }

    addBtn.addEventListener('click', add);
    input.addEventListener('keydown', e=>{ if(e.key==='Enter') add() });

    // initial render
    render();
  </script>
</body>
</html>
